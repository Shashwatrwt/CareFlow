<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareFlow Map – Uttarakhand</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e5e3df;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            background: #e5e3df;
        }
        #info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 1000;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            display: block;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info">Initializing...</div>

    <script>
        var map        = null;
        var markerLayer = null;
        var routeLayer  = null;
        var mapReady    = false;
        var leafletLoadAttempts = 0;
        var LEAFLET_SOURCES = [
            "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js",
            "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
        ];

        // FIX 1 & 3: Bounding box that covers ALL 10 Uttarakhand nodes
        // so tiles load for the full region and map fills the container
        var UTTARAKHAND_BOUNDS = [
            [29.2, 77.8],   // SW corner (south of Nainital, west of Dehradun)
            [31.0, 80.0]    // NE corner (north of Uttarkashi, east of Nainital)
        ];

        function forceRefresh() {
            if (map) {
                map.invalidateSize(true);
                if (typeof map.eachLayer === 'function') {
                    map.eachLayer(function(layer) {
                        // Force tile redraw in JavaFX WebView after resize.
                        if (layer && typeof layer.redraw === 'function') {
                            layer.redraw();
                        }
                    });
                }
                console.log("Map layout refreshed.");
            }
        }

        function setInfo(text) {
            var infoBox = document.getElementById('info');
            infoBox.style.display = 'block';
            infoBox.textContent = text;
        }

        function initMap() {
            if (mapReady) return;
            try {
                var mapDiv = document.getElementById('map');
                if (!mapDiv || mapDiv.clientWidth < 50 || mapDiv.clientHeight < 50) {
                    // JavaFX SplitPane/WebView may report zero size briefly.
                    setTimeout(initMap, 100);
                    return;
                }

                window.map = L.map(mapDiv, {
                    zoomControl: true,
                    attributionControl: true,
                    preferCanvas: true,
                    fadeAnimation: false,
                    zoomAnimation: true
                });
                map = window.map;

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap',
                    maxZoom: 18,
                }).addTo(map);

                markerLayer = L.layerGroup().addTo(map);
                routeLayer  = L.layerGroup().addTo(map);

                // FIX 3: Fit to full region bounds instead of arbitrary setView
                // This ensures all nodes are visible and tiles load for the whole area
                map.fitBounds(UTTARAKHAND_BOUNDS);

                // Multiple refreshes to handle JavaFX WebView sizing delays
                setTimeout(forceRefresh, 100);
                setTimeout(forceRefresh, 500);
                setTimeout(forceRefresh, 1500);

                window.addEventListener('resize', forceRefresh);

                mapReady = true;
                setInfo('Map Ready');
                console.log("Map successfully initialized.");

            } catch (e) {
                console.error("Map Initialization Error: " + e.message);
                setInfo('Error: ' + e.message);
            }
        }

        function loadLeafletScript(index) {
            if (index >= LEAFLET_SOURCES.length) {
                setInfo('Error: Leaflet failed to load (check internet/firewall).');
                return;
            }

            setInfo('Loading map engine... (source ' + (index + 1) + ')');
            var script = document.createElement('script');
            script.src = LEAFLET_SOURCES[index];
            script.async = true;
            script.onload = function() {
                leafletLoadAttempts = index + 1;
                checkLeaflet();
            };
            script.onerror = function() {
                loadLeafletScript(index + 1);
            };
            document.head.appendChild(script);
        }

        function checkLeaflet() {
            if (typeof L !== 'undefined') {
                setInfo('Leaflet loaded. Initializing map...');
                initMap();
            } else {
                setTimeout(function() { checkLeaflet(); }, 100);
            }
        }

        // --- Java Bridge Functions ---

        function initMarkers(coordsMap) {
            if (!mapReady || !markerLayer) return;
            try {
                markerLayer.clearLayers();
                for (var name in coordsMap) {
                    if (coordsMap.hasOwnProperty(name)) {
                        var c = coordsMap[name];
                        L.circleMarker([c.lat, c.lng], {
                            radius: 6,
                            fillColor: '#3388ff',
                            color: '#fff',
                            weight: 1,
                            fillOpacity: 0.9
                        }).addTo(markerLayer).bindTooltip(name, {
                            permanent: true,
                            direction: 'right',
                            offset: [8, 0]
                        });
                    }
                }
            } catch (e) { console.error("initMarkers Error: " + e.message); }
        }

        function drawRoute(coords, pathNames) {
            if (!mapReady || !routeLayer || !map) return;
            try {
                routeLayer.clearLayers();
                if (!coords || coords.length < 2) return;

                var latlngs = [];
                for (var i = 0; i < coords.length; i++) {
                    var c = coords[i];
                    if (c && typeof c.lat === 'number' && typeof c.lng === 'number') {
                        latlngs.push([c.lat, c.lng]);
                    }
                }
                if (latlngs.length < 2) return;

                // Draw the route line
                var polyline = L.polyline(latlngs, {
                    color: '#e74c3c',
                    weight: 5,
                    opacity: 0.8
                }).addTo(routeLayer);

                // FIX 2: Hide base markerLayer so route markers don't duplicate labels.
                // We re-show it when the route is cleared.
                markerLayer.eachLayer(function(layer) {
                    layer.closeTooltip();
                });

                // Start marker (green)
                L.circleMarker(latlngs[0], {
                    radius: 9,
                    fillColor: '#27ae60',
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 1
                }).bindTooltip(pathNames && pathNames[0] ? pathNames[0] : 'Start', {
                    permanent: true, direction: 'right', offset: [8, 0]
                }).addTo(routeLayer);

                // End marker (red)
                L.circleMarker(latlngs[latlngs.length - 1], {
                    radius: 9,
                    fillColor: '#c0392b',
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 1
                }).bindTooltip(
                    pathNames && pathNames[pathNames.length - 1]
                        ? pathNames[pathNames.length - 1] : 'End',
                    { permanent: true, direction: 'right', offset: [8, 0] }
                ).addTo(routeLayer);

                // Intermediate markers (orange)
                for (var j = 1; j < latlngs.length - 1; j++) {
                    L.circleMarker(latlngs[j], {
                        radius: 7,
                        fillColor: '#f39c12',
                        color: '#fff',
                        weight: 1,
                        fillOpacity: 0.9
                    }).bindTooltip(
                        pathNames && pathNames[j] ? pathNames[j] : '',
                        { permanent: true, direction: 'top', offset: [0, -8] }
                    ).addTo(routeLayer);
                }

                // FIX 1: Fit to full region after drawing route,
                // NOT just the route bounds — prevents tiles going gray
                map.fitBounds(UTTARAKHAND_BOUNDS, { padding: [20, 20] });

            } catch (e) { console.error("drawRoute Error: " + e.message); }
        }

        // Called from Java to reset the map back to base state
        function clearRoute() {
            if (!mapReady || !routeLayer) return;
            routeLayer.clearLayers();
            // Restore base marker tooltips
            markerLayer.eachLayer(function(layer) {
                layer.openTooltip();
            });
            map.fitBounds(UTTARAKHAND_BOUNDS);
        }

        window.onload = function() {
            setInfo('Initializing map...');
            loadLeafletScript(0);
        };
    </script>
</body>
</html>
